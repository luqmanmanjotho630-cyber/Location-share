<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDLMIRG2XcbTmezeZ7lfCJoQFzFXqJD0f8",
  authDomain: "locationshare-5e04e.firebaseapp.com",
  projectId: "locationshare-5e04e",
  storageBucket: "locationshare-5e04e.firebasestorage.app",
  messagingSenderId: "1078460289548",
  appId: "1:1078460289548:web:68b39e23bd8ebfae451429",
  measurementId: "G-TQW8JK8Q8G"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.getLocation = function () {

  if (!navigator.geolocation) {
    document.getElementById("status").innerHTML = "Geolocation support nahi hai.";
    return;
  }

  document.getElementById("status").innerHTML = "Location mil rahi hai...";

  navigator.geolocation.getCurrentPosition(

    async function(position){

      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      try{

        await addDoc(collection(db,"locations"),{
          latitude: lat,
          longitude: lon,
          createdAt: serverTimestamp()
        });

        document.getElementById("status").innerHTML =
        "✅ Location successfully share ho gayi.";

      }catch(err){

        document.getElementById("status").innerHTML =
        "Firebase Error: " + err.message;

      }

    },

    function(){

      document.getElementById("status").innerHTML =
      "Permission deny ya location nahi mili.";

    },

    {
      enableHighAccuracy:true,
      timeout:10000
    }

  );

}

</script>
