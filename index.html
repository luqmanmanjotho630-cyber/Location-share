<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Location Share</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.2);
width:300px;
}
button{
padding:12px 20px;
font-size:18px;
cursor:pointer;
}
#status{
margin-top:15px;
font-size:16px;
}
</style>

</head>
<body>

<div class="box">
<h2>Live Location Share</h2>
<p id="status">Location ka intezar...</p>

<button onclick="getLocation()">Location Share Karein</button>
</div>

<script>
function getLocation(){

if(!navigator.geolocation){
document.getElementById("status").innerHTML="Geolocation support nahi hai.";
return;
}

document.getElementById("status").innerHTML="Location mil rahi hai...";

navigator.geolocation.getCurrentPosition(

function(position){

let lat=position.coords.latitude;
let lon=position.coords.longitude;

document.getElementById("status").innerHTML=
"Latitude: "+lat+"<br>Longitude: "+lon;

},

function(error){

document.getElementById("status").innerHTML=
"Permission deny ya location nahi mili.";

},

{
enableHighAccuracy:true,
timeout:10000
}

);

}
</script>

</body>
</html>
