<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Location Share</title>
</head>
<body style="font-family:Arial;text-align:center;margin-top:50px;">

<h2>Live Location Share</h2>

<p id="status">Location ka intezar...</p>

<button onclick="shareLocation()">Location Share Karein</button>

<script>
function shareLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {

      let lat = position.coords.latitude;
      let lon = position.coords.longitude;

      document.getElementById("status").innerHTML =
      "Latitude: " + lat + "<br>Longitude: " + lon;

    }, function(error){
      alert("Location permission deny ho gayi.");
    });
  } else {
    alert("Geolocation supported nahi hai.");
  }
}
</script>

</body>
</html>
